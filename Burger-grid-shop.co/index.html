<!doctype html>
<html class="page" lang="ru">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./css/index.css" />
		<link
			rel="icon"
			href="./icons/favicon-shop.co-iconn-32x32.png"
			type="image/png"
		/>
		<script defer src="./js/index.js" type="module"></script>
		<title>Shop.co</title>
	</head>
	<body class="page__body">
		<div class="general-wrapper">
			<div class="top-container">
				<header class="top-header container">
					<p class="top__text">
						Зарегестрируйтесь и получите скидку 20% на первую покупку.
					</p>
					<p class="top__short-text">Скидка 20% на первую покупку.</p>
					<a class="top__link" href="#"> Зарегестрироваться сейчас</a>
					<button class="top__button" title="Закрыть" aria-label="Закрыть">
						<svg width="14" height="14">
							<use href="./icons/sprite.svg#cross"></use>
						</svg>
					</button>
				</header>
			</div>

			<div class="header-main container">
				<a class="logo" href="#">
					<p>SHOP.CO</p>
				</a>

				<nav
					class="header__menu header__menu--open"
					id="header__menu"
					aria-label="Главное меню"
				>
					<ul class="menu__list">
						<li class="menu__item dropdown-menu__item">
							<a class="menu__link" href="#shop" lang="en"
								>Магазин
								<svg class="header__menu-arrow" width="12" height="7">
									<use href="./icons/sprite.svg#arrow-down"></use>
								</svg>
							</a>
							<ul class="drop-menu__list">
								<li class="drop-menu__list-item">
									<a class="menu__link" href="#">Модницам и модникам</a>
								</li>
								<li class="drop-menu__list-item">
									<a class="menu__link" href="#">Аксессуары и все такое</a>
								</li>
								<li class="drop-menu__list-item">
									<a class="menu__link" href="#">Женщинам</a>
								</li>
								<li class="drop-menu__list-item">
									<a class="menu__link" href="#">Мужчинам</a>
								</li>
							</ul>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#discount">Скидки</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#new-arrivals">Новые поступления</a>
						</li>
						<li class="menu__item">
							<a class="menu__link" href="#brends">Бренды</a>
						</li>
					</ul>
				</nav>

				<div class="search">
					<button class="action-buttons__icon" title="Поиск" aria-label="Поиск">
						<svg class="search__icon" width="24" height="24">
							<use href="./icons/sprite.svg#search"></use>
						</svg>
					</button>
					<input
						class="search__input"
						type="text"
						name="search"
						placeholder="Искать товары..."
					/>
				</div>

				<div class="action-buttons">
					<button
						class="burger"
						aria-label="Открыть меню"
						aria-expanded="false"
						aria-controls="header__menu"
					>
						<svg class="burger__icon-menu" width="19" height="15">
							<use href="./icons/sprite.svg#burger"></use>
						</svg>
						<svg class="burger__icon-cross" width="24" height="24">
							<use href="./icons/sprite.svg#cross"></use>
						</svg>
					</button>
					<button class="action-buttons__icon" title="Поиск" aria-label="Поиск">
						<svg class="search__icon-mobile" width="21" height="21">
							<use href="./icons/sprite.svg#search-mobile"></use>
						</svg>
					</button>
					<button
						class="action-buttons__icon"
						title="Корзина"
						aria-label="Корзина"
					>
						<svg width="23" height="21">
							<use
								class="action-buttons__icon"
								href="./icons/sprite.svg#cart"
							></use>
						</svg>
					</button>
					<button
						class="action-buttons__icon"
						title="Профайл"
						aria-label="Профайл"
					>
						<svg class="action-buttons__icon" width="23" height="21">
							<use
								class="action-buttons__icon"
								href="./icons/sprite.svg#profile"
							></use>
						</svg>
					</button>
				</div>
			</div>
		</div>
	</body>
</html>
